<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שכחתי סיסמה - MakoletChain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background: #0d1526;
            position: relative;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border-radius: 16px;
            position: relative;
            z-index: 1;
        }
        .login-card h1 {
            text-align: center;
            color: white;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .login-card label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .login-card input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            margin-bottom: 1.2rem;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .login-card input[type="email"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            outline: none;
        }
        .login-card button {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .login-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .success-msg {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            color: #4ade80;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
        }
        .back-link:hover { color: rgba(255,255,255,0.7); }
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-container img {
            height: 60px;
            filter: invert(1) hue-rotate(180deg);
        }
        .orb-1 {
            position: fixed;
            width: 350px;
            height: 350px;
            background: rgba(99,102,241,0.08);
            border-radius: 50%;
            filter: blur(80px);
            top: 5%;
            left: 5%;
            z-index: 0;
            pointer-events: none;
        }
        .orb-2 {
            position: fixed;
            width: 280px;
            height: 280px;
            background: rgba(139,92,246,0.06);
            border-radius: 50%;
            filter: blur(60px);
            bottom: 10%;
            right: 10%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='makolet_logo.png') }}" alt="רשת המכולת">
        </div>
        <h1>שכחתי סיסמה</h1>
        <p class="subtitle">הכנס את כתובת המייל שלך ונשלח לך קישור לאיפוס</p>

        {% if sent %}
        <div class="success-msg">{{ message }}</div>
        {% else %}
        <form method="POST" action="/forgot-password">
            <label for="email">אימייל</label>
            <input type="email" id="email" name="email" required autofocus placeholder="your@email.com" dir="ltr">
            <button type="submit">שלח קישור</button>
        </form>
        {% endif %}

        <a href="/login" class="back-link">חזור להתחברות &larr;</a>
    </div>
</div>
</body>
</html>
