<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="{{ static_v('js/charts.js') }}"></script>
<script>
'use strict';
const SELECTED_MONTH = {{ selected_month | tojson }};
const BRANCH_ID = {{ branch_id | tojson }};
const monthLabel = {{ month_display | tojson }};
document.getElementById('month-label').textContent = monthLabel;

let pdfState = { date: null, page: 0, total: 0 };

async function loadSales() {
    const kpis = document.getElementById('sales-kpis');
    const tbody = document.getElementById('sales-tbody');
    // The table footer is server-rendered (single source of truth — see
    // the <tfoot> Jinja block). JS must NOT rebuild it: a stale inline
    // script would otherwise resurrect the old 3-cell layout.
    try {
        const res = await fetch(`/api/sales?month=${SELECTED_MONTH}&branch_id=${BRANCH_ID}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        // KPI cards
        kpis.innerHTML = `
            <div class="kpi-card kpi-card--income">
                <div class="kpi-header"><span class="kpi-icon">📈</span><span class="kpi-label">סה"כ הכנסות</span></div>
                <span class="kpi-value profit">${formatMoney(d.total)}</span>
                <span style="font-size:0.8rem;color:rgba(241,245,249,0.5)">${d.days} ימים</span>
            </div>
            <div class="kpi-card" style="background:linear-gradient(135deg,#1e3a5f,#15294a);border-color:rgba(59,130,246,0.25)">
                <div class="kpi-header"><span class="kpi-icon">📊</span><span class="kpi-label">ממוצע ליום</span></div>
                <span class="kpi-value" style="color:#93c5fd">${formatMoney(d.avg)}</span>
            </div>
            <div class="kpi-card" style="background:linear-gradient(135deg,#064e3b,#065f46);border-color:rgba(34,197,94,0.25)">
                <div class="kpi-header"><span class="kpi-icon">🔝</span><span class="kpi-label">יום הכי גבוה</span></div>
                <span class="kpi-value" style="color:#86efac">${formatMoney(d.highest)}</span>
            </div>
            <div class="kpi-card" style="background:linear-gradient(135deg,#7f1d1d,#991b1b);border-color:rgba(239,68,68,0.25)">
                <div class="kpi-header"><span class="kpi-icon">🔻</span><span class="kpi-label">יום הכי נמוך</span></div>
                <span class="kpi-value" style="color:#fca5a5">${formatMoney(d.lowest)}</span>
            </div>
            <div class="kpi-card" style="background:linear-gradient(135deg,#064e3b,#065f46);border-color:rgba(34,197,94,0.25)">
                <div class="kpi-header"><span class="kpi-icon">🧾</span><span class="kpi-label">ממוצע עסקאות יומי</span></div>
                <span class="kpi-value" style="color:#86efac">${d.avg_daily_txn} עסקאות/יום</span>
            </div>
            <div class="kpi-card" style="background:linear-gradient(135deg,#1e3a5f,#15294a);border-color:rgba(59,130,246,0.25)">
                <div class="kpi-header"><span class="kpi-icon">💳</span><span class="kpi-label">ממוצע לעסקה</span></div>
                <span class="kpi-value" style="color:#93c5fd">₪ ${d.avg_txn_value}</span>
            </div>`;

        // Table rows
        if (!d.sales.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem">אין נתוני הכנסות לחודש זה</td></tr>';
            return;
        }

        tbody.innerHTML = d.sales.map(s => {
            const pdfBtn = s.has_pdf
                ? `<button class="btn-pdf" onclick="openPdf('${s.date}')">📄 צפה</button>`
                : '<span style="color:#64748b;font-size:0.8rem">—</span>';
            const avgTxn = s.avg_per_txn != null ? `₪ ${s.avg_per_txn}` : '—';
            const src = s.source || 'z_report';
            let srcBadge;
            if (src === 'z_report') {
                srcBadge = '<span style="background:rgba(34,197,94,0.15); color:#86efac; border:1px solid rgba(34,197,94,0.3); border-radius:4px; padding:2px 8px; font-size:0.75rem; font-weight:600;">Z ✓</span>';
            } else if (src === 'aviv_backfill') {
                srcBadge = '<span style="background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); border-radius:4px; padding:2px 8px; font-size:0.75rem; font-weight:600;">גיבוי</span>';
            } else if (src === 'live_provisional') {
                srcBadge = '<span style="background:rgba(245,158,11,0.15); color:#fde68a; border:1px solid rgba(245,158,11,0.3); border-radius:4px; padding:2px 8px; font-size:0.75rem; font-weight:600;">זמני ⚡</span>';
            } else {
                srcBadge = `<span style="background:rgba(148,163,184,0.15); color:#cbd5e1; border:1px solid rgba(148,163,184,0.3); border-radius:4px; padding:2px 8px; font-size:0.75rem; font-weight:600;">${src}</span>`;
            }
            const fetched = s.fetched_at
                ? `<span style="font-size:0.8rem;color:#94a3b8">${s.fetched_at.slice(0,16).replace('T',' ')}</span>`
                : '<span style="color:#64748b;font-size:0.8rem">—</span>';
            // Expandable only when the row has a positive amount. Closed-day
            // sentinels and provisional 0-rows show "—" with no chevron.
            const hasAmount = Number(s.amount) > 0;
            const toggleCell = hasAmount
                ? `<td style="text-align:center"><button class="dept-toggle" type="button"
                       aria-expanded="false" aria-label="הצג פירוט מחלקות"
                       data-date="${s.date}" data-amount="${s.amount}"
                       onclick="toggleDeptPanel(this)">
                       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
                            aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                   </button></td>`
                : '<td style="text-align:center"><span style="color:#64748b;font-size:0.8rem">—</span></td>';
            return `<tr data-z-date="${s.date}">
                <td>${s.date}</td>
                <td class="money profit" style="direction:ltr;text-align:left;font-weight:600">₪ ${Number(s.amount).toLocaleString('he-IL', {minimumFractionDigits:2})}</td>
                <td style="text-align:center">${s.transactions || '—'}</td>
                <td style="text-align:center">${avgTxn}</td>
                <td>${srcBadge}</td>
                <td style="text-align:center">${fetched}</td>
                <td>${pdfBtn}</td>
                ${toggleCell}
            </tr>`;
        }).join('');

    } catch(err) {
        console.error(err);
        kpis.innerHTML = '<p style="color:#ef4444;padding:1rem">שגיאה בטעינת נתונים</p>';
    }
}

// ── Department breakdown panel ─────────────────────────────────────────────
// Lazy-loaded per (branch, date); cached client-side so re-expanding the
// same row doesn't re-fetch. The day-total is taken from the Z row itself
// (data-amount) — the API never owns this number; daily_sales does.
const PRIORITY_DEPT_CODES = [5, 83, 2];
const PRIORITY_DEPT_META = {
    5:  { label: 'חלב',     unit: 'יח׳' },
    83: { label: 'סיגריות', unit: 'יח׳' },
    2:  { label: 'ירקות',   unit: 'ק״ג' },  // produce sold by weight in Aviv
};
const REST_VISIBLE_COUNT = 6;
const _deptCache = new Map();        // date → API response (or 'ERROR')
const _restExpanded = new Set();     // dates whose "rest" list is fully shown

function _fmtMoney(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return '₪ ' + Number(n).toLocaleString('he-IL',
        { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function _fmtQty(q, unit) {
    if (q === null || q === undefined) return '';
    // Produce ships fractional kg; everything else is whole units. Trim .00.
    const isWhole = Math.abs(q - Math.round(q)) < 0.001;
    const qStr = isWhole ? Math.round(q).toString()
                         : Number(q).toLocaleString('he-IL',
                              { minimumFractionDigits: 1, maximumFractionDigits: 2 });
    return `${qStr} ${unit}`;
}

function _pct(part, whole) {
    if (!whole || whole <= 0) return '';
    return (part / whole * 100).toFixed(1) + '%';
}

function _stripDeptCodePrefix(name) {
    // Aviv stores dept_name as "<code> <name>" (e.g. "5 מקרר-מוצרי חלב ותחליפים").
    // Strip the leading code so the panel reads cleanly.
    return String(name || '').replace(/^\s*\d+\s+/, '').trim();
}

function _layoutGridIconSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <rect x="4" y="4" width="6" height="6" rx="1"/>
              <rect x="14" y="4" width="6" height="6" rx="1"/>
              <rect x="4" y="14" width="6" height="6" rx="1"/>
              <rect x="14" y="14" width="6" height="6" rx="1"/>
            </svg>`;
}

function _renderDeptPanel(data, dayTotal) {
    // data: { date, departments: [{code, name, amount, qty}, ...] }
    // dayTotal: numeric Z total from the row's data-amount (denominator for %).
    const dateFmt = data.date ? data.date.split('-').reverse().join('/') : '';
    const head = `<div class="dept-panel-head">${_layoutGridIconSvg()}
                    <span>מכירות לפי מחלקה — ${dateFmt}</span>
                  </div>`;

    if (!data.departments || data.departments.length === 0) {
        return `<div class="dept-panel">${head}
                  <div class="dept-empty">אין נתוני מחלקות ליום זה</div>
                </div>`;
    }

    const byCode = {};
    for (const d of data.departments) byCode[d.code] = d;

    // Priority cards (always render all 3, "—" when missing).
    const cardsHtml = PRIORITY_DEPT_CODES.map(code => {
        const meta = PRIORITY_DEPT_META[code];
        const entry = byCode[code];
        if (!entry) {
            return `<div class="dept-priority-card" data-code="${code}">
                      <div class="dept-priority-label">${meta.label}</div>
                      <div class="dept-priority-amount">—</div>
                      <div class="dept-priority-meta">אין נתון</div>
                    </div>`;
        }
        const pctStr = _pct(entry.amount, dayTotal);
        const qtyStr = _fmtQty(entry.qty, meta.unit);
        const metaParts = [];
        if (qtyStr) metaParts.push(qtyStr);
        if (pctStr) metaParts.push(`${pctStr} מהמכירות`);
        return `<div class="dept-priority-card" data-code="${code}">
                  <div class="dept-priority-label">${meta.label}</div>
                  <div class="dept-priority-amount">${_fmtMoney(entry.amount)}</div>
                  <div class="dept-priority-meta">${metaParts.join(' · ')}</div>
                </div>`;
    }).join('');

    // "Rest" — every dept that isn't one of the 3 priorities, by amount desc.
    const rest = data.departments
        .filter(d => !PRIORITY_DEPT_CODES.includes(d.code));
    const isExpanded = _restExpanded.has(data.date);
    const visibleRest = isExpanded ? rest : rest.slice(0, REST_VISIBLE_COUNT);
    const hiddenRest = isExpanded ? [] : rest.slice(REST_VISIBLE_COUNT);
    const hiddenSum = hiddenRest.reduce((acc, d) => acc + (d.amount || 0), 0);

    const restRowsHtml = visibleRest.map(d => `
        <div class="dept-rest-row">
            <span class="dept-rest-name">${_stripDeptCodePrefix(d.name)}</span>
            <span class="dept-rest-amount">${_fmtMoney(d.amount)}</span>
        </div>`).join('');

    const restCollapsedHtml = (hiddenRest.length > 0)
        ? `<div class="dept-rest-collapsed"
               onclick="expandDeptRest('${data.date}')">
              + ${hiddenRest.length} מחלקות נוספות / ${_fmtMoney(hiddenSum)}
           </div>`
        : '';

    const totalHtml = `<div class="dept-total-row">
                         <span class="label">סה״כ</span>
                         <span class="amount">${_fmtMoney(dayTotal)}</span>
                       </div>`;

    return `<div class="dept-panel">
              ${head}
              <div class="dept-priority-grid">${cardsHtml}</div>
              ${rest.length > 0 ? `<div class="dept-rest-title">שאר המחלקות</div>
                                   <div class="dept-rest-grid">
                                     ${restRowsHtml}${restCollapsedHtml}
                                   </div>` : ''}
              ${totalHtml}
            </div>`;
}

async function toggleDeptPanel(btn) {
    const tr = btn.closest('tr');
    const date = btn.dataset.date;
    const amount = Number(btn.dataset.amount);
    const isOpen = btn.getAttribute('aria-expanded') === 'true';

    // One open at a time — collapse any other open row first.
    document.querySelectorAll('.dept-toggle[aria-expanded="true"]')
        .forEach(other => {
            if (other === btn) return;
            other.setAttribute('aria-expanded', 'false');
            other.setAttribute('aria-label', 'הצג פירוט מחלקות');
            const sibling = other.closest('tr').nextElementSibling;
            if (sibling && sibling.classList.contains('dept-panel-row')) {
                sibling.remove();
            }
        });

    if (isOpen) {
        // Collapse: remove the panel row directly after.
        const panelRow = tr.nextElementSibling;
        if (panelRow && panelRow.classList.contains('dept-panel-row')) {
            panelRow.remove();
        }
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('aria-label', 'הצג פירוט מחלקות');
        return;
    }

    // Expand: insert a loading row first; replace its content when fetch done.
    const panelRow = document.createElement('tr');
    panelRow.className = 'dept-panel-row';
    panelRow.innerHTML = `<td colspan="8">
        <div class="dept-panel">
          <div class="dept-loading">
            <div class="spinner" style="display:inline-block;width:16px;height:16px;vertical-align:middle"></div>
            <span style="margin-inline-start:0.5rem">טוען פירוט מחלקות…</span>
          </div>
        </div></td>`;
    tr.insertAdjacentElement('afterend', panelRow);
    btn.setAttribute('aria-expanded', 'true');
    btn.setAttribute('aria-label', 'הסתר פירוט מחלקות');

    try {
        let data = _deptCache.get(date);
        if (!data) {
            const res = await fetch(
                `/api/department-sales?branch_id=${BRANCH_ID}&date=${encodeURIComponent(date)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            data = await res.json();
            _deptCache.set(date, data);
        } else if (data === 'ERROR') {
            // Previously errored — retry once on user-initiated re-expand.
            _deptCache.delete(date);
            return toggleDeptPanel(btn);
        }
        // Ignore stale render if the user collapsed during the fetch.
        if (btn.getAttribute('aria-expanded') !== 'true') return;
        const cell = panelRow.querySelector('td');
        if (cell) cell.innerHTML = _renderDeptPanel(data, amount);
    } catch (err) {
        console.error('dept-sales fetch failed', err);
        _deptCache.set(date, 'ERROR');
        const cell = panelRow.querySelector('td');
        if (cell) {
            cell.innerHTML = `<div class="dept-panel">
                <div class="dept-error">שגיאה בטעינת פירוט המחלקות</div>
              </div>`;
        }
    }
}

function expandDeptRest(date) {
    _restExpanded.add(date);
    // Find the open panel row for this date and re-render in place.
    const btn = document.querySelector(`.dept-toggle[data-date="${date}"]`);
    if (!btn) return;
    const tr = btn.closest('tr');
    const panelRow = tr.nextElementSibling;
    if (!panelRow || !panelRow.classList.contains('dept-panel-row')) return;
    const data = _deptCache.get(date);
    const amount = Number(btn.dataset.amount);
    if (!data || data === 'ERROR') return;
    const cell = panelRow.querySelector('td');
    if (cell) cell.innerHTML = _renderDeptPanel(data, amount);
}

async function openPdf(dateStr) {
    const overlay = document.getElementById('pdf-overlay');
    const body = document.getElementById('pdf-body');
    overlay.classList.add('open');
    document.getElementById('pdf-title').textContent = `דוח Z — ${dateStr}`;
    body.innerHTML = '<div class="loading"><div class="spinner"></div><span>טוען PDF...</span></div>';

    try {
        const res = await fetch(`/api/sales/pdf-pages/${dateStr}?branch_id=${BRANCH_ID}`);
        const d = await res.json();
        pdfState = { date: dateStr, page: 0, total: d.pages || 1 };
        renderPdfPage();
    } catch(err) {
        body.innerHTML = '<p style="color:#ef4444">שגיאה בטעינת PDF</p>';
    }
}

function renderPdfPage() {
    const body = document.getElementById('pdf-body');
    body.innerHTML = `<img src="/api/sales/pdf-image/${pdfState.date}/${pdfState.page}?branch_id=${BRANCH_ID}" alt="Page ${pdfState.page+1}">`;
    document.getElementById('pdf-page-info').textContent = `עמוד ${pdfState.page+1} מתוך ${pdfState.total}`;
    document.getElementById('pdf-prev').disabled = pdfState.page <= 0;
    document.getElementById('pdf-next').disabled = pdfState.page >= pdfState.total - 1;
}

function pdfPage(delta) {
    const newPage = pdfState.page + delta;
    if (newPage < 0 || newPage >= pdfState.total) return;
    pdfState.page = newPage;
    renderPdfPage();
}

function closePdf() {
    document.getElementById('pdf-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePdf(); });

// ── Monthly department summary tiles ───────────────────────────────────────
// Hero = average daily % share of the Z across the month; sub = ₪ total.
// Hidden entirely when no qualifying day has dept data for the month.
async function loadDeptMonthTiles() {
    const section = document.getElementById('dept-month-tiles');
    try {
        const res = await fetch(`/api/department-sales-monthly?month=${SELECTED_MONTH}&branch_id=${BRANCH_ID}`);
        if (!res.ok) { section.style.display = 'none'; return; }
        const d = await res.json();
        if (!d.days_counted || !d.tiles) { section.style.display = 'none'; return; }
        document.getElementById('dept-month-label').textContent = monthLabel;
        for (const t of d.tiles) {
            const card = section.querySelector(`.dept-month-card[data-code="${t.code}"]`);
            if (!card) continue;
            card.querySelector('.dept-month-pct').textContent =
                (t.avg_pct === null || t.avg_pct === undefined) ? '—' : `${t.avg_pct.toFixed(1)}%`;
            card.querySelector('.dept-month-total').textContent = formatMoney(t.total);
        }
        section.style.display = 'block';
    } catch (err) {
        section.style.display = 'none';
    }
}

loadSales();
loadDeptMonthTiles();

// ── Sales charts (server-rendered; red/blue decided in backend) ──
const SALES_CHARTS = {{ charts_data | tojson }};
initSalesDailyChart('salesDailyChart', SALES_CHARTS.daily);
initSalesDowChart('salesDowChart', SALES_CHARTS.dow);
initSalesCumulativeChart('salesCumChart', SALES_CHARTS.cumulative);
</script>
