<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - MakoletChain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .login-page {
            min-height: 100vh;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            background: #0d1526;
            position: relative;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 460px;
            padding: 56px 48px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border-radius: 16px;
            position: relative;
            z-index: 1;
        }
        .login-card h1 {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 26px;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }
        .login-card label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .login-card input[type="email"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .login-card input[type="email"]:focus,
        .login-card input[type="password"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            outline: none;
        }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 20px;
        }
        .remember-row input[type="checkbox"] {
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .remember-row label {
            margin-bottom: 0;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .login-card button {
            width: 100%;
            margin-top: 24px;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .login-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 8px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 12px;
        }
        .logo-container img {
            height: 72px;
            filter: invert(1) hue-rotate(180deg);
        }
        .orb-1 {
            position: fixed;
            width: 350px;
            height: 350px;
            background: rgba(99,102,241,0.08);
            border-radius: 50%;
            filter: blur(80px);
            top: 5%;
            left: 5%;
            z-index: 0;
            pointer-events: none;
        }
        .orb-2 {
            position: fixed;
            width: 280px;
            height: 280px;
            background: rgba(139,92,246,0.06);
            border-radius: 50%;
            filter: blur(60px);
            bottom: 10%;
            right: 10%;
            z-index: 0;
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .login-page {
                align-items: flex-start;
                padding: 24px 16px;
                height: auto;
                min-height: 100vh;
            }
            .login-card {
                padding: 40px 28px;
            }
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='makolet_logo.png') }}" alt="רשת המכולת">
        </div>
        <h1>התחברות</h1>
        <p class="subtitle">רשת המכולת — מערכת ניהול</p>

        {% if message %}
        <div style="background:rgba(99,102,241,0.15); border:1px solid #6366f1;
             color:#a5b4fc; padding:10px 14px; border-radius:8px;
             font-size:13px; text-align:center; margin-bottom:12px;">
          {{ message }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <label for="email">אימייל</label>
            <input type="email" id="email" name="email" required autofocus placeholder="your@email.com" dir="ltr">

            <label for="password">סיסמה</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" dir="ltr">

            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember" value="1">
                <label for="remember">זכור אותי</label>
            </div>

            <button type="submit">כניסה</button>
        </form>

        <div style="text-align:center; margin-top:12px;">
          <a href="/forgot-password" style="font-size:13px; color:rgba(255,255,255,0.45);
             text-decoration:none;">שכחתי סיסמה</a>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</div>
</body>
</html>
