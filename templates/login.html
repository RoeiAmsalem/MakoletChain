<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - MakoletChain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .login-card h1 {
            text-align: center;
            color: white;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .login-card label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .login-card input[type="email"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            margin-bottom: 1.2rem;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .login-card input[type="email"]:focus,
        .login-card input[type="password"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            outline: none;
        }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .remember-row input[type="checkbox"] {
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .remember-row label {
            margin-bottom: 0;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .login-card button {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .login-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 8px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }
        .logo-container img {
            height: 60px;
            filter: invert(1) hue-rotate(180deg);
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-orb" style="width:300px; height:300px; background:rgba(99,102,241,0.08); filter:blur(80px); top:10%; left:10%;"></div>
    <div class="bg-orb" style="width:250px; height:250px; background:rgba(139,92,246,0.06); filter:blur(80px); bottom:15%; right:15%;"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='makolet_logo.png') }}" alt="רשת המכולת">
        </div>
        <h1>התחברות</h1>
        <p class="subtitle">רשת המכולת — מערכת ניהול</p>

        <form method="POST" action="/login">
            <label for="email">אימייל</label>
            <input type="email" id="email" name="email" required autofocus placeholder="your@email.com" dir="ltr">

            <label for="password">סיסמה</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" dir="ltr">

            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember" value="1">
                <label for="remember">זכור אותי</label>
            </div>

            <button type="submit">כניסה</button>
        </form>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
