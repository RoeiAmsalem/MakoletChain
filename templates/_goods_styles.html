<style>
    .goods-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn {
        font-size: 0.82rem; font-weight: 600; padding: 0.4rem 0.85rem;
        background: rgba(255,255,255,0.06); border: 1px solid #334155;
        border-radius: 6px; color: #94a3b8; cursor: pointer; font-family: inherit;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .filter-btn.active { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); color: #93c5fd; }
    .doc-badge {
        display: inline-block; font-size: 0.72rem; font-weight: 700;
        padding: 0.15rem 0.5rem; border-radius: 999px; white-space: nowrap;
    }
    .doc-badge.invoice { background: rgba(59,130,246,0.2); color: #93c5fd; }
    .doc-badge.delivery { background: rgba(34,197,94,0.2); color: #86efac; }
    .doc-badge.credit { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .doc-badge.return { background: rgba(250,204,21,0.2); color: #fde68a; }
    .pay-pill {
        display: inline-block; font-size: 0.7rem; font-weight: 700;
        padding: 0.12rem 0.5rem; border-radius: 999px; white-space: nowrap;
    }
    .pay-pill.paid { background: rgba(34,197,94,0.18); color: #86efac; }
    .pay-pill.unpaid { background: rgba(239,68,68,0.16); color: #fca5a5; }
    /* clickable invoice rows */
    tr.doc-row { cursor: pointer; transition: background 0.12s; }
    tr.doc-row:hover, tr.doc-row:focus { background: rgba(59,130,246,0.08); outline: none; }
    .row-chevron { color: #64748b; font-weight: 700; margin-inline-start: 0.35rem; }
    tr.doc-row:hover .row-chevron { color: #93c5fd; }
    /* detail modal */
    .doc-modal-overlay {
        position: fixed; inset: 0; background: rgba(2,6,23,0.72);
        display: flex; align-items: flex-start; justify-content: center;
        padding: 4vh 1rem; z-index: 1000; overflow-y: auto;
    }
    /* The `hidden` attribute is the ONLY thing that closes this modal. A bare
       `.doc-modal-overlay { display:flex }` overrides the UA `[hidden]{display:none}`
       rule, leaving a full-viewport overlay that silently swallows every row
       click (-> closeDocDetail -> stuck spinner). This attribute selector
       outranks the class, so `hidden` actually hides. */
    .doc-modal-overlay[hidden] { display: none; }
    .doc-modal {
        position: relative; width: 100%; max-width: 640px;
        background: #0d1526; border: 1px solid #334155; border-radius: 14px;
        padding: 1.25rem 1.25rem 1rem; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .doc-modal-close {
        position: absolute; top: 0.6rem; left: 0.6rem; width: 32px; height: 32px;
        background: rgba(255,255,255,0.06); border: 1px solid #334155; border-radius: 8px;
        color: #94a3b8; cursor: pointer; font-size: 0.9rem; line-height: 1;
    }
    .doc-modal-close:hover { background: rgba(255,255,255,0.12); color: white; }
    .doc-modal-loading, .doc-modal-error { padding: 2.5rem 1rem; text-align: center; color: #94a3b8; }
    .doc-modal-loading::before {
        content: ''; display: block; width: 26px; height: 26px; margin: 0 auto 0.85rem;
        border: 3px solid rgba(148,163,184,0.25); border-top-color: #93c5fd;
        border-radius: 50%; animation: doc-spin 0.8s linear infinite;
    }
    @keyframes doc-spin { to { transform: rotate(360deg); } }
    .doc-modal-error { color: #fca5a5; display: flex; flex-direction: column; align-items: center; gap: 0.85rem; }
    .doc-modal-error .dm-err-msg { font-size: 0.9rem; }
    .dm-retry {
        background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.5);
        color: #93c5fd; font-family: inherit; font-size: 0.85rem; font-weight: 700;
        padding: 0.45rem 1.1rem; border-radius: 8px; cursor: pointer; min-height: 40px;
    }
    .dm-retry:hover { background: rgba(59,130,246,0.32); color: #fff; }
    .dm-head { margin-bottom: 0.85rem; padding-inline-end: 2rem; }
    .dm-head h3 { margin: 0 0 0.5rem; color: white; font-size: 1.1rem; }
    .dm-meta { display: flex; flex-wrap: wrap; gap: 0.4rem 0.55rem; align-items: center; }
    .dm-ref { font-size: 0.8rem; color: #94a3b8; direction: ltr; }
    .dm-date { font-size: 0.8rem; color: #64748b; direction: ltr; }
    .dm-vat {
        display: flex; gap: 0.5rem; margin-bottom: 1rem;
        background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 0.6rem 0.5rem;
    }
    .dm-vat > div { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .dm-vat span { font-size: 0.72rem; color: #94a3b8; }
    .dm-vat strong { font-size: 0.95rem; color: #e2e8f0; direction: ltr; }
    .dm-vat-total strong { color: #93c5fd; }
    .dm-table-wrap { overflow-x: auto; }
    .dm-table { margin: 0; }
    .dm-table .line-name { color: #e2e8f0; }
    .dm-table .line-bc { font-size: 0.72rem; color: #64748b; direction: ltr; text-align: right; margin-top: 0.15rem; }
    .dm-table .line-disc { color: #fde68a; font-size: 0.72rem; font-weight: 700; }
    @media (max-width: 768px) {
        .doc-modal { padding: 1rem 0.85rem 0.85rem; }
        .dm-vat strong { font-size: 0.85rem; }
        .dm-table thead th, .dm-table tbody td { padding: 8px 6px; font-size: 0.78rem; }
    }
    .tfoot-total td { font-weight: 700; border-top: 2px solid #334155; background: #0f172a !important; }
    /* יעדים (supplier-budget) view */
    .goal-sub { font-size: 0.8rem; color: #94a3b8; }
    .goal-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 0.6rem; }
    .goal-overpace { font-size: 0.82rem; color: #fca5a5; font-weight: 600; margin-bottom: 1rem; min-height: 1.1rem; }
    .goal-overpace.ok { color: #86efac; }
    /* Cohesive colored summary tiles, matching the /goods KPI family. Targeted
       by DOM order (stable on desktop AND mobile — the יתרה headline is 3rd in
       source even when visually reordered): 1=סה"כ תקציב, 2=סה"כ הוצאה, 3=יתרה.
         • יתרה   — green/red/neutral headline (--profit/--loss gradient via JS).
         • סה"כ הוצאה — blue (the --goods family).
         • סה"כ תקציב — indigo (the app's seg-toggle accent #6366f1; NOT brown). */
    .goal-kpis .kpi-label { white-space: nowrap; }
    .goal-kpis .kpi-card:nth-child(1) {                       /* סה"כ תקציב — indigo */
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        border: 1px solid rgba(99,102,241,0.4); box-shadow: none;
    }
    .goal-kpis .kpi-card:nth-child(2) {                       /* סה"כ הוצאה — blue */
        background: linear-gradient(135deg, #4c8ffb 0%, #2563eb 100%);
        border: 1px solid rgba(76,143,251,0.35); box-shadow: none;
    }
    .goal-kpis .kpi-card:nth-child(1) .kpi-value,
    .goal-kpis .kpi-card:nth-child(2) .kpi-value { color: #fff; }
    .goal-kpis .kpi-card:nth-child(1) .kpi-label,
    .goal-kpis .kpi-card:nth-child(2) .kpi-label { color: rgba(255,255,255,0.85); }
    /* Mobile summary: יתרה headline full-width on top, the two quiet cards in a
       row beneath — compact, no cramped 3-up, no wrapped labels. */
    @media (max-width: 768px) {
        .goal-kpis { grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem; }
        .goal-kpi-headline { grid-column: 1 / -1; order: -1; }
        .goal-kpi-headline .kpi-value { font-size: 1.7rem !important; }
        .goal-kpis .kpi-card { padding: 0.7rem 0.85rem !important; }
        .goal-kpi-quiet .kpi-value { font-size: 1.15rem !important; }
        .goal-kpis .kpi-label { font-size: 0.74rem !important; }
        .goal-kpis .kpi-icon { font-size: 1rem !important; }
    }
    .goal-table td, .goal-table th { white-space: nowrap; }
    /* Phone (iPhone 13): the desktop 4-col table becomes a stack of supplier
       CARDS. Name on its own line, then a 3-up labeled row — תקציב (input) ·
       הוצאה · יתרה — each with a small grey label above its value so all four
       read cleanly at phone width with no clipping and no horizontal scroll. */
    @media (max-width: 768px) {
        #goal-table, #goal-table tbody { display: block; }
        #goal-table thead, #goal-table tfoot { display: none; }
        #goal-table tbody tr {
            display: grid;
            grid-template-columns: minmax(0,1.15fr) minmax(0,1fr) minmax(0,1fr);
            gap: 0.4rem 0.7rem; align-items: start;
            border: 1px solid #334155; border-radius: 12px;
            background: rgba(255,255,255,0.025) !important;
            margin-bottom: 0.6rem; padding: 0.8rem 0.9rem;
        }
        #goal-table tbody td {
            display: block; border: none !important; padding: 0 !important;
            background: transparent !important;
        }
        #goal-table tbody td:nth-child(1) {   /* supplier name — own line, full width */
            grid-column: 1 / -1; font-weight: 700; color: #fff; font-size: 1rem;
            white-space: normal; line-height: 1.3; margin-bottom: 0.1rem;
        }
        /* label above each field; values right-aligned to sit under the label */
        #goal-table tbody td.num { text-align: right; }
        #goal-table tbody td.num::before {
            display: block; color: #94a3b8; font-weight: 500;
            font-size: 0.72rem; margin-bottom: 0.3rem; white-space: nowrap;
        }
        #goal-table tbody td:nth-child(2)::before { content: 'תקציב'; }
        #goal-table tbody td.goal-spend::before  { content: 'הוצאה'; }
        #goal-table tbody td.goal-rem::before    { content: 'יתרה'; }
        #goal-table tbody td.goal-spend {
            color: #e2e8f0; font-size: 1rem; font-variant-numeric: tabular-nums;
        }
        #goal-table tbody td.goal-rem {
            font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums;
        }
        /* neutral (יתרה == 0 / unbudgeted "—") only — must NOT outrank .pos/.neg */
        #goal-table tbody td.goal-rem:not(.pos):not(.neg) { color: #e2e8f0; }
        /* input fills its column so it stays a comfortable, easy-to-edit field */
        #goal-table tbody td .goal-budget-input { width: 100%; }
    }
    /* Budget context line under a supplier in the מסמכים "לפי ספק" list. */
    .sg-budget { flex: 0 0 100%; font-size: 0.78rem; color: #94a3b8; font-weight: 500; margin-top: 0.3rem; direction: rtl; }
    .goal-budget-input {
        width: 104px; background: #0f172a; color: #e2e8f0;
        border: 1px solid #334155; border-radius: 6px; padding: 6px 8px;
        font-size: 0.9rem; text-align: left; direction: ltr; outline: none;
        font-variant-numeric: tabular-nums;
    }
    .goal-budget-input:focus { border-color: #3b82f6; }
    .goal-budget-input.saving { opacity: 0.5; }
    .goal-budget-input.saved { border-color: #22c55e; }
    .num { direction: ltr; text-align: left; font-variant-numeric: tabular-nums; }
    /* The shared `.data-table thead th { text-align:right }` outranks `.num`, so
       numeric headers were right-aligned while their cells (תקציב input / הוצאה /
       יתרה) are left-aligned — the header sat to the right of its values. Match
       the headers to the cells so each header sits directly above its column. */
    #goal-table thead th.num { text-align: left; }
    .pos { color: #86efac; font-weight: 600; }
    .neg { color: #fca5a5; font-weight: 600; }
    .muted { color: #64748b; }
    .goal-table tfoot td { background: #0f172a !important; font-weight: 700; border-top: 2px solid #334155; }
    .view-toggle { display: flex; gap: 0.5rem; align-items: center; }
    .view-toggle-label { font-size: 0.82rem; color: #94a3b8; font-weight: 600; }
    .supplier-group { border: 1px solid #334155; border-radius: 8px; margin-bottom: 0.5rem; background: rgba(255,255,255,0.02); }
    .supplier-group summary {
        cursor: pointer; padding: 0.75rem 1rem; display: flex; align-items: center;
        justify-content: space-between; gap: 0.75rem; list-style: none;
        font-weight: 600; user-select: none; flex-wrap: wrap;
    }
    .supplier-group summary::-webkit-details-marker { display: none; }
    .supplier-group summary::before { content: '▸'; color: #94a3b8; font-size: 0.85rem; transition: transform 0.15s; }
    .supplier-group[open] summary::before { transform: rotate(90deg); }
    .supplier-group summary:hover { background: rgba(255,255,255,0.04); }
    .supplier-group .sg-name { flex: 1; color: white; }
    .supplier-group .sg-count { font-size: 0.78rem; color: #94a3b8; font-weight: 500; }
    .supplier-group .sg-total { font-size: 0.95rem; color: #93c5fd; direction: ltr; font-weight: 700; }
    .supplier-group .sg-body { padding: 0 0.5rem 0.5rem 0.5rem; overflow-x: auto; }
    .supplier-group .data-table { margin: 0; }
    @media (max-width: 768px) {
        .goods-kpis { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .goods-kpis .kpi-card { padding: 0.75rem !important; }
        .goods-kpis .kpi-value { font-size: 1.25rem !important; }
        .goods-kpis .kpi-label { font-size: 0.72rem !important; }
        .goods-kpis .kpi-icon { font-size: 1rem !important; }
        .filter-bar { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
        /* ≥44px tap target; inline-flex so the <a> sub-toggle (לפי ספק/רשימה)
           actually honors min-height and centers its label. */
        .filter-btn { min-height: 44px; display: inline-flex; align-items: center;
            justify-content: center; padding: 0.5rem 0.95rem; white-space: nowrap; touch-action: manipulation; }
        .section-title { font-size: 1rem !important; }
        #goods-table thead th, #goods-table tbody td { padding: 8px 6px; font-size: 0.8rem; }
        #goods-table .money { font-size: 0.8rem; }
        .supplier-group summary { padding: 0.6rem 0.75rem; font-size: 0.88rem; }
        .supplier-group .sg-total { font-size: 0.85rem; }
        .supplier-group .sg-count { font-size: 0.72rem; }
    }
    /* ── Mobile (≤768px) touch + legibility pass (theme/colors unchanged) ──
       Verified under a real iPhone 13 device profile, not a window resize. */
    @media (max-width: 768px) {
        /* מסמכים/יעדים toggle: full-width segments, ≥44px tap height. Overrides
           the global `@media .seg-btn{padding:6px 14px}` (lower specificity). */
        #goods-view-toggle { width: 100%; max-width: 360px; }
        #goods-view-toggle .seg-btn { flex: 1; min-height: 44px; padding: 10px 16px; font-size: 0.95rem; }
        /* תקציב input: 16px stops iOS zoom-on-focus; 44px tap height. */
        .goal-budget-input { font-size: 16px !important; min-height: 44px; width: 116px; padding: 8px 10px; }
        /* clickable supplier row — comfortable tap height. */
        .supplier-group summary { min-height: 48px; }
        /* legible secondary text — no tiny labels. */
        .goal-sub, .goal-overpace { font-size: 0.85rem; }
        .sg-budget { font-size: 0.8rem; }
    }
</style>
