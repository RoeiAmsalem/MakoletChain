{% extends "base.html" %}
{% block title %}הכנסות רשת - קופה שקופה{% endblock %}
{% block head %}
<style>
    .nr-wrap { max-width: 760px; margin: 0 auto; }

    .nr-head {
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;
    }
    .nr-head h1 { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin: 0; }
    .nr-date-ctl {
        display: flex; align-items: center; gap: 0.4rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
        border-radius: 8px; padding: 4px 6px;
    }
    .nr-date-ctl input[type=date] {
        background: transparent; border: none; color: var(--text-primary);
        font-family: inherit; font-size: 0.85rem; color-scheme: dark;
    }
    .nr-date-ctl button {
        background: transparent; border: none; color: var(--text-secondary);
        font-size: 1rem; cursor: pointer; font-family: inherit;
        min-width: 30px; min-height: 30px; border-radius: 6px; touch-action: manipulation;
    }
    .nr-date-ctl button:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }

    /* HERO */
    .nr-hero {
        position: relative; background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); padding: 1.4rem 1.5rem; margin-bottom: 1rem;
        box-shadow: var(--shadow);
    }
    .nr-spark { position: absolute; top: 1rem; inset-inline-start: 1.25rem; opacity: 0.9; }
    .nr-hero-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.2rem; }
    .nr-hero-total {
        font-size: 2.9rem; font-weight: 800; color: var(--text-light);
        line-height: 1.05; letter-spacing: -1px;
    }
    .nr-hero-sub { margin-top: 0.55rem; font-size: 0.92rem; color: var(--text-secondary); display: flex; flex-wrap: wrap; gap: 0.4rem 0.9rem; align-items: center; }
    .nr-delta { font-weight: 700; }
    .nr-delta.up { color: var(--profit); }
    .nr-delta.down { color: var(--loss); }
    .nr-delta.flat { color: var(--text-muted); }

    /* COVERAGE */
    .nr-coverage {
        font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;
        padding: 0.6rem 0.85rem; background: rgba(255,255,255,0.03);
        border: 1px solid var(--card-border); border-radius: 8px;
    }
    .nr-coverage b { color: var(--text-primary); }
    .nr-coverage .nr-missing { color: #f59e0b; }

    /* TOP/BOTTOM callouts */
    .nr-callouts { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
    .nr-callout {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: 10px; padding: 0.8rem 0.9rem;
    }
    .nr-callout .lbl { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .nr-callout .nm { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); }
    .nr-callout .amt { font-size: 0.95rem; font-weight: 700; margin-top: 0.15rem; }
    .nr-callout.top { border-color: var(--profit-border); }
    .nr-callout.top .amt { color: var(--profit); }
    .nr-callout.bottom .amt { color: var(--text-secondary); }

    /* RANKED STRIP */
    .nr-strip { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 1rem 1.1rem; }
    .nr-strip h2 { font-size: 0.92rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.8rem; }
    .nr-row { display: grid; grid-template-columns: 130px 1fr auto; align-items: center; gap: 0.7rem; padding: 0.32rem 0; }
    .nr-row .rname { font-size: 0.85rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nr-bar-track { background: rgba(255,255,255,0.05); border-radius: 999px; height: 12px; overflow: hidden; }
    .nr-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #818cf8); border-radius: 999px; }
    .nr-row .ramt { font-size: 0.85rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
    .nr-more {
        margin-top: 0.7rem; background: transparent; border: 1px solid var(--card-border);
        border-radius: 8px; color: var(--text-secondary); padding: 0.45rem 0.8rem;
        font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%;
        min-height: 38px; touch-action: manipulation;
    }
    .nr-more:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

    .nr-empty { text-align: center; color: var(--text-secondary); padding: 2.5rem 1rem; }

    @media (max-width: 480px) {
        .nr-hero { padding-top: 2.6rem; }
        .nr-spark { top: 0.9rem; }
        .nr-hero-total { font-size: 2.3rem; }
        .nr-callouts { grid-template-columns: 1fr; }
        .nr-row { grid-template-columns: 92px 1fr auto; gap: 0.5rem; }
        .nr-row .rname { font-size: 0.8rem; }
    }
</style>
{% endblock %}

{% block content %}
<div class="nr-wrap">
    <div class="nr-head">
        <h1>הכנסות רשת — יומי</h1>
        <div class="nr-date-ctl">
            <button type="button" id="nrPrev" title="יום קודם">‹</button>
            <input type="date" id="nrDate">
            <button type="button" id="nrNext" title="יום הבא">›</button>
        </div>
    </div>

    <div id="nrBody">
        <div class="nr-empty">טוען…</div>
    </div>
</div>

<script>
(function () {
    const body = document.getElementById('nrBody');
    const dateInput = document.getElementById('nrDate');

    function fmt(v) {
        return '₪' + Number(v || 0).toLocaleString('he-IL', { maximumFractionDigits: 0 });
    }
    function shiftDate(iso, days) {
        const d = new Date(iso + 'T00:00:00');
        d.setDate(d.getDate() + days);
        return d.toISOString().slice(0, 10);
    }

    function sparkline(series) {
        const vals = series.map(p => p.total);
        const max = Math.max(...vals, 1);
        const W = 96, H = 30, n = vals.length;
        if (n < 2) return '';
        const step = W / (n - 1);
        const pts = vals.map((v, i) => `${(i * step).toFixed(1)},${(H - (v / max) * (H - 4) - 2).toFixed(1)}`).join(' ');
        const last = pts.split(' ').pop().split(',');
        return `<svg class="nr-spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true">
            <polyline fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
            <circle cx="${last[0]}" cy="${last[1]}" r="2.4" fill="#818cf8"/>
        </svg>`;
    }

    function deltaHtml(pct) {
        if (pct === null || pct === undefined) {
            return `<span class="nr-delta flat">— אין נתוני אתמול</span>`;
        }
        const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
        const arrow = pct > 0 ? '▲' : (pct < 0 ? '▼' : '◆');
        const sign = pct > 0 ? '+' : '';
        return `<span class="nr-delta ${cls}">${arrow} ${sign}${pct.toLocaleString('he-IL', { maximumFractionDigits: 1 })}% מאתמול</span>`;
    }

    function render(d) {
        if (!d.date || d.reported === 0) {
            body.innerHTML = `<div class="nr-empty">אין נתוני הכנסות ליום זה.</div>`;
            return;
        }
        // Coverage line
        let cov = `<b>${d.reported}</b> מתוך <b>${d.total_branches}</b> סניפים דיווחו`;
        if (d.missing && d.missing.length) {
            const names = d.missing.map(m => m.branch_name).join(', ');
            cov += ` · <span class="nr-missing">חסרים: ${names}</span>`;
        }

        // Ranked strip
        const top = d.per_branch[0] ? d.per_branch[0].amount : 1;
        const COLLAPSE = 8;
        const rowsHtml = d.per_branch.map((b, i) => {
            const w = Math.max(2, (b.amount / (top || 1)) * 100);
            const hidden = i >= COLLAPSE ? ' style="display:none" data-tail="1"' : '';
            return `<div class="nr-row"${hidden}>
                <div class="rname" title="${b.branch_name}">${i + 1}. ${b.branch_name}</div>
                <div class="nr-bar-track"><div class="nr-bar-fill" style="width:${w.toFixed(1)}%"></div></div>
                <div class="ramt">${fmt(b.amount)}</div>
            </div>`;
        }).join('');
        const tailCount = d.per_branch.length - COLLAPSE;
        const moreBtn = tailCount > 0
            ? `<button class="nr-more" id="nrMore">+ ${tailCount} נוספים</button>` : '';

        const callouts = (d.top && d.bottom) ? `
            <div class="nr-callouts">
                <div class="nr-callout top">
                    <div class="lbl">הסניף המוביל</div>
                    <div class="nm">${d.top.branch_name}</div>
                    <div class="amt">${fmt(d.top.amount)}</div>
                </div>
                <div class="nr-callout bottom">
                    <div class="lbl">הסניף הנמוך</div>
                    <div class="nm">${d.bottom.branch_name}</div>
                    <div class="amt">${fmt(d.bottom.amount)}</div>
                </div>
            </div>` : '';

        body.innerHTML = `
            <div class="nr-hero">
                ${sparkline(d.series_7d)}
                <div class="nr-hero-label">סך הכנסות הרשת · ${d.date}</div>
                <div class="nr-hero-total">${fmt(d.chain_total)}</div>
                <div class="nr-hero-sub">
                    ${deltaHtml(d.pct_vs_prev)}
                    <span>ממוצע לסניף ${fmt(d.avg_per_store)}</span>
                </div>
            </div>
            <div class="nr-coverage">${cov}</div>
            ${callouts}
            <div class="nr-strip">
                <h2>דירוג סניפים</h2>
                ${rowsHtml}
                ${moreBtn}
            </div>`;

        const moreEl = document.getElementById('nrMore');
        if (moreEl) {
            moreEl.addEventListener('click', () => {
                body.querySelectorAll('[data-tail]').forEach(el => el.style.display = 'grid');
                moreEl.remove();
            });
        }
    }

    function load(dateStr) {
        body.innerHTML = `<div class="nr-empty">טוען…</div>`;
        const q = dateStr ? ('?date=' + encodeURIComponent(dateStr)) : '';
        fetch('/api/network/revenue' + q)
            .then(r => r.json())
            .then(d => {
                if (d.error) { body.innerHTML = `<div class="nr-empty">אין הרשאה.</div>`; return; }
                if (d.date) dateInput.value = d.date;
                render(d);
            })
            .catch(() => { body.innerHTML = `<div class="nr-empty">שגיאה בטעינת הנתונים.</div>`; });
    }

    dateInput.addEventListener('change', () => load(dateInput.value));
    document.getElementById('nrPrev').addEventListener('click', () => {
        if (dateInput.value) load(shiftDate(dateInput.value, -1));
    });
    document.getElementById('nrNext').addEventListener('click', () => {
        if (dateInput.value) load(shiftDate(dateInput.value, 1));
    });

    load(null); // default: most recent day with data
})();
</script>
{% endblock %}
