{% extends "base.html" %}
{% block title %}הכנסות רשת - קופה שקופה{% endblock %}
{% block head %}
<style>
    /* Full app-shell width (.main-content is 1400px). Collapses to the
       single-column mobile layout below; metric cards stack 1-up ≤480px. */
    .nr-wrap { width: 100%; max-width: 1400px; margin: 0 auto; }

    .nr-head {
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;
    }
    .nr-head h1 { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin: 0; }
    .nr-date-ctl {
        display: flex; align-items: center; gap: 0.4rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
        border-radius: 8px; padding: 4px 6px;
    }
    .nr-date-ctl input[type=date] {
        background: transparent; border: none; color: var(--text-primary);
        font-family: inherit; font-size: 0.85rem; color-scheme: dark;
    }
    .nr-date-ctl button {
        background: transparent; border: none; color: var(--text-secondary);
        font-size: 1rem; cursor: pointer; font-family: inherit;
        min-width: 30px; min-height: 30px; border-radius: 6px; touch-action: manipulation;
    }
    .nr-date-ctl button:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }

    /* ── BAND 1 — metric cards ── */
    .nr-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 0.85rem; }
    .nr-metric {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); padding: 1rem 1.1rem; box-shadow: var(--shadow);
        border-top: 3px solid var(--card-border);
    }
    .nr-metric.accent { border-top-color: var(--profit); }
    .nr-metric .m-label { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 0.35rem; }
    .nr-metric .m-value { font-size: 1.85rem; font-weight: 800; color: var(--text-light); line-height: 1.1; letter-spacing: -0.5px; }
    .nr-metric .m-sub { margin-top: 0.4rem; font-size: 0.82rem; color: var(--text-secondary); }
    .nr-delta { font-weight: 700; }
    .nr-delta.up { color: var(--profit); }
    .nr-delta.down { color: var(--loss); }
    .nr-delta.flat { color: var(--text-muted); }

    .nr-coverage {
        font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 1rem;
        padding: 0.7rem 0.9rem; background: rgba(255,255,255,0.03);
        border: 1px solid var(--card-border); border-radius: 10px;
    }
    .nr-coverage b { color: var(--text-primary); }
    .nr-coverage .nr-missing { color: #f59e0b; }

    /* ── BAND 2 — trend card ── */
    .nr-trend {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); padding: 1rem 1.2rem; margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .nr-trend h2 { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.7rem; }
    .nr-trend-wrap { position: relative; height: 120px; width: 100%; }

    /* ── BAND 3 — ranked list ── */
    .nr-strip { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 1rem 1.2rem; box-shadow: var(--shadow); }
    .nr-strip h2 { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.9rem; }
    .nr-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: baseline; gap: 0.7rem; padding: 0.4rem 0; border-bottom: 1px solid rgba(148,163,184,0.08); }
    .nr-row .rrank { font-size: 0.82rem; color: var(--text-muted); font-weight: 700; text-align: center; }
    .nr-row .rname { font-size: 0.88rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nr-row .ramt { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; text-align: left; }
    .nr-row.missing .rname, .nr-row.missing .ramt, .nr-row.missing .rrank { color: var(--text-muted); }
    .nr-row.missing .ramt { font-weight: 500; font-size: 0.82rem; }
    .nr-rows.collapsed .nr-row.nr-tail { display: none; }
    .nr-more {
        margin-top: 0.8rem; background: transparent; border: 1px solid var(--card-border);
        border-radius: 8px; color: var(--text-secondary); padding: 0.45rem 0.8rem;
        font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%;
        min-height: 38px; touch-action: manipulation;
    }
    .nr-more:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

    .nr-empty { text-align: center; color: var(--text-secondary); padding: 2.5rem 1rem; }

    /* ── Wide desktop ── 2-column-major store list, all rows visible ── */
    @media (min-width: 900px) {
        .nr-rows { column-count: 2; column-gap: 2.5rem; }
        .nr-row { break-inside: avoid; }
        .nr-rows.collapsed .nr-row.nr-tail { display: grid; }
        .nr-more { display: none; }
    }
    @media (max-width: 899px) {
        .nr-metrics { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
        .nr-metrics { grid-template-columns: 1fr; }
        .nr-metric .m-value { font-size: 1.6rem; }
    }
</style>
{% endblock %}

{% block content %}
<div class="nr-wrap">
    <div class="nr-head">
        <h1>הכנסות רשת — יומי</h1>
        <div class="nr-date-ctl">
            <button type="button" id="nrPrev" title="יום קודם">‹</button>
            <input type="date" id="nrDate">
            <button type="button" id="nrNext" title="יום הבא">›</button>
        </div>
    </div>

    <div id="nrBody">
        <div class="nr-empty">טוען…</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
(function () {
    const body = document.getElementById('nrBody');
    const dateInput = document.getElementById('nrDate');
    let trendChart = null;

    function fmt(v) {
        return '₪' + Number(v || 0).toLocaleString('he-IL', { maximumFractionDigits: 0 });
    }
    function fmtNum(v) {
        return Number(v || 0).toLocaleString('he-IL', { maximumFractionDigits: 0 });
    }
    function shiftDate(iso, days) {
        const d = new Date(iso + 'T00:00:00');
        d.setDate(d.getDate() + days);
        return d.toISOString().slice(0, 10);
    }
    function dm(iso) {  // YYYY-MM-DD → DD/MM
        const p = iso.split('-');
        return p[2] + '/' + p[1];
    }

    function deltaHtml(pct, suffix) {
        if (pct === null || pct === undefined) {
            return `<span class="nr-delta flat">— אין נתוני השוואה</span>`;
        }
        const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
        const arrow = pct > 0 ? '▲' : (pct < 0 ? '▼' : '◆');
        const sign = pct > 0 ? '+' : '';
        return `<span class="nr-delta ${cls}">${arrow} ${sign}${pct.toLocaleString('he-IL', { maximumFractionDigits: 1 })}%</span> ${suffix}`;
    }

    function renderTrend(series) {
        const ctx = document.getElementById('nrTrend');
        if (!ctx) return;
        const labels = series.map(p => dm(p.date));
        const data = series.map(p => p.total);
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx.getContext('2d'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99,102,241,0.15)',
                    fill: true, tension: 0.3, borderWidth: 2,
                    pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#818cf8',
                }],
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: (items) => series[items[0].dataIndex].date,
                            label: (item) => fmt(item.parsed.y),
                        },
                    },
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#94a3b8', maxRotation: 0, autoSkip: false,
                            callback: (val, idx) => (idx === 0 || idx === labels.length - 1) ? labels[idx] : '',
                        },
                    },
                    y: { display: false, beginAtZero: true },
                },
            },
        });
    }

    function render(d) {
        if (!d.date || d.reported === 0) {
            body.innerHTML = `<div class="nr-empty">אין נתוני הכנסות ליום זה.</div>`;
            return;
        }
        // Coverage line
        let cov = `<b>${d.reported}</b> מתוך <b>${d.total_branches}</b> סניפים דיווחו`;
        if (d.missing && d.missing.length) {
            cov += ` · <span class="nr-missing">חסר: ${d.missing.map(m => m.branch_name).join(', ')}</span>`;
        }

        // Ranked rows — reporting branches (desc) then missing greyed at end.
        const COLLAPSE = 8;
        let idx = 0;
        const reportedRows = d.per_branch.map((b, i) => {
            const tail = idx >= COLLAPSE ? ' nr-tail' : ''; idx++;
            return `<div class="nr-row${tail}">
                <div class="rrank">${i + 1}</div>
                <div class="rname" title="${b.branch_name}">${b.branch_name}</div>
                <div class="ramt">${fmt(b.amount)}</div>
            </div>`;
        }).join('');
        const missingRows = (d.missing || []).map(m => {
            const tail = idx >= COLLAPSE ? ' nr-tail' : ''; idx++;
            return `<div class="nr-row missing${tail}">
                <div class="rrank">–</div>
                <div class="rname" title="${m.branch_name}">${m.branch_name}</div>
                <div class="ramt">אין נתונים</div>
            </div>`;
        }).join('');
        const tailCount = (d.per_branch.length + (d.missing ? d.missing.length : 0)) - COLLAPSE;
        const moreBtn = tailCount > 0 ? `<button class="nr-more" id="nrMore">+ ${tailCount} נוספים</button>` : '';

        body.innerHTML = `
            <div class="nr-metrics">
                <div class="nr-metric accent">
                    <div class="m-label">סה״כ הכנסות · ${d.date}</div>
                    <div class="m-value">${fmt(d.chain_total)}</div>
                    <div class="m-sub">${deltaHtml(d.pct_vs_prev, 'מאתמול')}</div>
                </div>
                <div class="nr-metric">
                    <div class="m-label">ממוצע לסניף</div>
                    <div class="m-value">${fmt(d.avg_per_store)}</div>
                    <div class="m-sub">${d.reported} סניפים מדווחים</div>
                </div>
                <div class="nr-metric">
                    <div class="m-label">עסקאות</div>
                    <div class="m-value">${fmtNum(d.total_transactions)}</div>
                    <div class="m-sub">ממוצע ${fmt(d.avg_basket)} לעסקה</div>
                </div>
                <div class="nr-metric">
                    <div class="m-label">חודש מתגלגל</div>
                    <div class="m-value">${fmt(d.month_to_date_total)}</div>
                    <div class="m-sub">${deltaHtml(d.pct_vs_prev_month, 'מהחודש הקודם')}</div>
                </div>
            </div>
            <div class="nr-coverage">${cov}</div>
            <div class="nr-trend">
                <h2>מגמת הכנסות הרשת — 14 ימים</h2>
                <div class="nr-trend-wrap"><canvas id="nrTrend"></canvas></div>
            </div>
            <div class="nr-strip">
                <h2>דירוג סניפים</h2>
                <div class="nr-rows collapsed">${reportedRows}${missingRows}</div>
                ${moreBtn}
            </div>`;

        renderTrend(d.series_14d || []);

        const moreEl = document.getElementById('nrMore');
        if (moreEl) {
            moreEl.addEventListener('click', () => {
                body.querySelector('.nr-rows').classList.remove('collapsed');
                moreEl.remove();
            });
        }
    }

    function load(dateStr) {
        body.innerHTML = `<div class="nr-empty">טוען…</div>`;
        const q = dateStr ? ('?date=' + encodeURIComponent(dateStr)) : '';
        fetch('/api/network/revenue' + q)
            .then(r => r.json())
            .then(d => {
                if (d.error) { body.innerHTML = `<div class="nr-empty">אין הרשאה.</div>`; return; }
                if (d.date) dateInput.value = d.date;
                render(d);
            })
            .catch(() => { body.innerHTML = `<div class="nr-empty">שגיאה בטעינת הנתונים.</div>`; });
    }

    dateInput.addEventListener('change', () => load(dateInput.value));
    document.getElementById('nrPrev').addEventListener('click', () => {
        if (dateInput.value) load(shiftDate(dateInput.value, -1));
    });
    document.getElementById('nrNext').addEventListener('click', () => {
        if (dateInput.value) load(shiftDate(dateInput.value, 1));
    });

    load(null); // default: most recent day with data
})();
</script>
{% endblock %}
