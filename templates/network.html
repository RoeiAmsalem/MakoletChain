{% extends "base.html" %}
{% block title %}תצוגת רשת - קופה שקופה{% endblock %}
{% block head %}
<style>
    html, body { overflow-x: hidden; max-width: 100vw; }

    .net-header {
        display: flex; align-items: flex-end; justify-content: space-between;
        flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
    }
    .net-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin: 0; }
    .net-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .net-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .net-pill {
        display: inline-flex; gap: 4px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px; padding: 4px;
    }
    .net-pill button {
        background: transparent; color: var(--text-secondary);
        border: none; border-radius: 999px;
        padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; font-family: inherit; min-height: 36px;
        touch-action: manipulation;
    }
    .net-pill button.active { background: var(--accent); color: #fff; }

    /* Icon-only buttons in the view toggle — match the inline-SVG pattern
       used elsewhere (base.html PWA install button, share icon). */
    .net-pill button.net-icon-btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 6px 10px; min-width: 40px;
    }
    .net-pill button.net-icon-btn svg {
        width: 18px; height: 18px;
        display: block;
    }

    /* Summary bar */
    .net-summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        margin-bottom: 1.25rem;
    }
    .net-summary-card {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); padding: 0.9rem 1rem;
    }
    .net-summary-label {
        font-size: 0.78rem; color: var(--text-secondary);
        font-weight: 600; margin-bottom: 0.35rem;
    }
    .net-summary-value {
        font-size: 1.35rem; font-weight: 700; color: var(--text-primary);
        direction: ltr; text-align: right;
    }
    .net-summary-card.profit .net-summary-value { color: var(--profit); }

    /* ─── Tile view ──────────────────────────────────────────── */
    .net-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.7rem;
    }
    .net-tile {
        position: relative; overflow: hidden;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 10px; padding: 0.85rem 0.85rem 0.75rem;
        padding-top: 1rem; /* room for the top strip */
        cursor: pointer; text-decoration: none; color: inherit;
        display: block; min-height: 118px;
        transition: transform 0.08s ease, background 0.12s ease, border-color 0.12s ease;
        touch-action: manipulation;
    }
    .net-tile::before {
        /* top status strip */
        content: ''; position: absolute; top: 0; left: 0; right: 0;
        height: 4px; background: var(--profit);
    }
    .net-tile.closed::before { background: var(--text-muted); }
    .net-tile:hover {
        background: rgba(255,255,255,0.04);
        border-color: rgba(34,197,94,0.4);
        transform: translateY(-1px);
    }
    .net-tile.closed { opacity: 0.55; }
    .net-tile.closed:hover { border-color: var(--card-border); transform: none; }

    .net-tile-name {
        font-size: 1rem; /* ~16px */
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .net-tile-amount {
        font-size: 1.15rem; /* ~18px */
        font-weight: 700;
        color: var(--profit);
        direction: ltr; text-align: right;
    }
    .net-tile-sub { font-size: 0.74rem; color: var(--text-secondary); margin-top: 3px; }
    .net-tile-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }
    .net-tile.closed .net-tile-name { color: var(--text-secondary); }

    /* ─── List view ──────────────────────────────────────────── */
    .net-list {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); overflow: hidden;
    }
    .net-row {
        display: grid;
        /* RTL row: rightmost → leftmost = dot | name | transactions | revenue */
        grid-template-columns: 16px 1fr minmax(90px, auto) minmax(120px, auto);
        align-items: center; gap: 0.75rem;
        padding: 0.7rem 1rem;
        border-bottom: 1px solid rgba(148,163,184,0.1);
        text-decoration: none; color: inherit;
        cursor: pointer;
        touch-action: manipulation;
        min-height: 48px;
        transition: background 0.1s ease;
    }
    .net-row:last-child { border-bottom: none; }
    .net-row:hover { background: rgba(255,255,255,0.03); }
    .net-row.closed { opacity: 0.55; }

    .net-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--profit); justify-self: center;
        box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }
    .net-row.closed .net-dot {
        background: var(--text-muted);
        box-shadow: 0 0 0 3px rgba(100,116,139,0.15);
    }
    .net-row-name {
        font-size: 1rem; /* ~16px */
        font-weight: 700;
        color: var(--text-primary);
        text-align: right;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .net-row.closed .net-row-name { color: var(--text-secondary); }
    .net-row-txn {
        font-size: 0.82rem;
        color: var(--text-secondary);
        text-align: left;
        direction: ltr;
        white-space: nowrap;
    }
    .net-row-amount {
        font-size: 1.05rem; /* ~17px */
        font-weight: 700;
        color: var(--profit);
        direction: ltr; text-align: left;
        white-space: nowrap;
    }
    .net-row.closed .net-row-amount { color: var(--text-muted); }

    .net-empty {
        background: var(--card); border: 1px solid var(--card-border);
        border-radius: var(--radius); padding: 1.5rem;
        text-align: center; color: var(--text-secondary);
    }

    @media (max-width: 768px) {
        .net-title { font-size: 1.05rem; }
        .net-summary { grid-template-columns: 1fr; }
        .net-summary-value { font-size: 1.15rem; }

        /* Tiles */
        .net-grid {
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
        }
        .net-tile { padding: 0.85rem 0.7rem 0.65rem; min-height: 108px; }
        .net-tile-name { font-size: 0.92rem; }
        .net-tile-amount { font-size: 1rem; }

        /* List rows tighten — keep name + revenue clear, drop txn column width */
        .net-row {
            grid-template-columns: 14px 1fr minmax(60px, auto) minmax(95px, auto);
            gap: 0.5rem; padding: 0.65rem 0.75rem;
        }
        .net-row-name { font-size: 0.92rem; }
        .net-row-txn { font-size: 0.75rem; }
        .net-row-amount { font-size: 0.95rem; }
    }
</style>
{% endblock %}

{% block content %}

<section class="net-header">
    <div>
        <h1 class="net-title">תצוגת רשת</h1>
        <div class="net-subtitle">
            כל הסניפים בזמן אמת · עודכן <span id="net-updated">--:--</span>
        </div>
    </div>
    <div class="net-controls">
        <div class="net-pill" role="tablist" aria-label="תצוגה">
            <button type="button" id="view-tiles" class="net-icon-btn active"
                    onclick="setView('tiles')" aria-label="תצוגת אריחים" title="תצוגת אריחים">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                </svg>
            </button>
            <button type="button" id="view-list" class="net-icon-btn"
                    onclick="setView('list')" aria-label="תצוגת רשימה" title="תצוגת רשימה">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="8" x2="21" y1="6" y2="6"/>
                    <line x1="8" x2="21" y1="12" y2="12"/>
                    <line x1="8" x2="21" y1="18" y2="18"/>
                    <line x1="3" x2="3.01" y1="6" y2="6"/>
                    <line x1="3" x2="3.01" y1="12" y2="12"/>
                    <line x1="3" x2="3.01" y1="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="net-pill" role="tablist" aria-label="מיון">
            <button type="button" id="sort-revenue" class="active" onclick="setSort('revenue')">לפי הכנסות</button>
            <button type="button" id="sort-name" onclick="setSort('name')">לפי שם</button>
        </div>
    </div>
</section>

<section class="net-summary">
    <div class="net-summary-card profit">
        <div class="net-summary-label">סה״כ הכנסות עכשיו</div>
        <div class="net-summary-value" id="sum-total">₪ 0</div>
    </div>
    <div class="net-summary-card">
        <div class="net-summary-label">עסקאות</div>
        <div class="net-summary-value" id="sum-transactions">0</div>
    </div>
    <div class="net-summary-card">
        <div class="net-summary-label">ממוצע לסניף</div>
        <div class="net-summary-value" id="sum-avg">₪ 0</div>
    </div>
</section>

<!-- Tiles container -->
<div id="net-grid" class="net-grid"></div>

<!-- List container (hidden by default; same data) -->
<div id="net-list" class="net-list" style="display:none;"></div>

{% endblock %}

{% block scripts %}
<script>
'use strict';

let CURRENT_SORT = 'revenue';
let CURRENT_VIEW = 'tiles';  // session-local; no localStorage (blocked).
let LAST_BRANCHES = [];

function setSort(mode) {
    CURRENT_SORT = mode;
    document.getElementById('sort-revenue').classList.toggle('active', mode === 'revenue');
    document.getElementById('sort-name').classList.toggle('active', mode === 'name');
    render(LAST_BRANCHES);
}

function setView(mode) {
    CURRENT_VIEW = mode;
    document.getElementById('view-tiles').classList.toggle('active', mode === 'tiles');
    document.getElementById('view-list').classList.toggle('active', mode === 'list');
    document.getElementById('net-grid').style.display = (mode === 'tiles') ? '' : 'none';
    document.getElementById('net-list').style.display = (mode === 'list') ? '' : 'none';
    render(LAST_BRANCHES);
}

function fmtMoney(n) {
    return '₪ ' + Math.round(Number(n) || 0).toLocaleString('he-IL');
}

function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
}

function isClosedOrNoData(b) {
    return b.is_closed || b.amount === null || b.amount === undefined;
}

function renderTile(b) {
    const name = escapeHtml(b.branch_name || '');
    const href = '/?branch_id=' + encodeURIComponent(b.branch_id);
    if (b.is_closed) {
        const lastDate = b.last_date ? '<div class="net-tile-meta">עדכון אחרון: ' + escapeHtml(b.last_date) + '</div>' : '';
        return (
            '<a class="net-tile closed" href="' + href + '">' +
              '<div class="net-tile-name">' + name + '</div>' +
              '<div class="net-tile-sub">סגור · החנות סגורה</div>' +
              lastDate +
            '</a>'
        );
    }
    if (b.amount === null || b.amount === undefined) {
        return (
            '<a class="net-tile closed" href="' + href + '">' +
              '<div class="net-tile-name">' + name + '</div>' +
              '<div class="net-tile-sub">אין נתונים</div>' +
            '</a>'
        );
    }
    const txn = (b.transactions || 0) + ' עסקאות';
    const timeOnly = b.last_updated ? String(b.last_updated).split(' ')[0] : '';
    const meta = timeOnly ? '<div class="net-tile-meta">עודכן: ' + escapeHtml(timeOnly) + '</div>' : '';
    return (
        '<a class="net-tile" href="' + href + '">' +
          '<div class="net-tile-name">' + name + '</div>' +
          '<div class="net-tile-amount">' + fmtMoney(b.amount) + '</div>' +
          '<div class="net-tile-sub">' + txn + '</div>' +
          meta +
        '</a>'
    );
}

function renderRow(b) {
    const name = escapeHtml(b.branch_name || '');
    const href = '/?branch_id=' + encodeURIComponent(b.branch_id);
    const closed = isClosedOrNoData(b);
    const cls = 'net-row' + (closed ? ' closed' : '');
    const txn = closed ? '—' : ((b.transactions || 0).toLocaleString('he-IL') + ' עסקאות');
    const amt = (b.amount === null || b.amount === undefined) ? '—' : fmtMoney(b.amount);
    return (
        '<a class="' + cls + '" href="' + href + '">' +
          '<span class="net-dot" aria-hidden="true"></span>' +
          '<span class="net-row-name">' + name + '</span>' +
          '<span class="net-row-txn">' + txn + '</span>' +
          '<span class="net-row-amount">' + amt + '</span>' +
        '</a>'
    );
}

function sortBranches(list) {
    const arr = list.slice();
    if (CURRENT_SORT === 'name') {
        arr.sort(function(a, b) {
            return String(a.branch_name || '').localeCompare(String(b.branch_name || ''), 'he');
        });
        return arr;
    }
    arr.sort(function(a, b) {
        const av = (a.amount === null || a.amount === undefined) ? -1 : Number(a.amount);
        const bv = (b.amount === null || b.amount === undefined) ? -1 : Number(b.amount);
        return bv - av;
    });
    return arr;
}

function render(branches) {
    const grid = document.getElementById('net-grid');
    const list = document.getElementById('net-list');
    if (!branches || branches.length === 0) {
        const empty = '<div class="net-empty">אין סניפים להצגה</div>';
        if (grid) grid.innerHTML = empty;
        if (list) list.innerHTML = empty;
        return;
    }
    const sorted = sortBranches(branches);
    if (CURRENT_VIEW === 'tiles' && grid) {
        grid.innerHTML = sorted.map(renderTile).join('');
    } else if (CURRENT_VIEW === 'list' && list) {
        list.innerHTML = sorted.map(renderRow).join('');
    }
}

function loadNetwork() {
    fetch('/api/live-sales/network')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            LAST_BRANCHES = d.branches || [];
            render(LAST_BRANCHES);

            const total = d.chain_total || 0;
            const totalCount = d.total_count || (LAST_BRANCHES.length || 0);
            const avg = totalCount > 0 ? total / totalCount : 0;
            const txnSum = LAST_BRANCHES.reduce(function(acc, b) {
                return acc + (Number(b.transactions) || 0);
            }, 0);

            document.getElementById('sum-total').textContent = fmtMoney(total);
            document.getElementById('sum-transactions').textContent =
                Number(txnSum).toLocaleString('he-IL');
            document.getElementById('sum-avg').textContent = fmtMoney(avg);

            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('net-updated').textContent = hh + ':' + mm;
        })
        .catch(function() {
            const err = '<div class="net-empty">שגיאה בטעינת נתונים</div>';
            const grid = document.getElementById('net-grid');
            const list = document.getElementById('net-list');
            if (grid) grid.innerHTML = err;
            if (list) list.innerHTML = err;
        });
}

loadNetwork();
setInterval(loadNetwork, 300000);
</script>
{% endblock %}
