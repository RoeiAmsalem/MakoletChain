<script>
function filterDocs(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const rows = document.querySelectorAll('#goods-table tbody tr');
    rows.forEach(row => {
        if (type === 'all') { row.style.display = ''; }
        else { row.style.display = row.dataset.type === type ? '' : 'none'; }
    });
}

// ── Invoice line-item detail (on-demand BilBoy /customer/doc) ──
const DOC_TYPE_LABELS = { 2: 'תעודת משלוח', 3: 'חשבונית', 4: 'חשבונית זיכוי', 5: 'תעודת החזרה' };

function nis(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    var n = Number(v);
    try {
        return '₪ ' + n.toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    } catch (e) {
        // Older WebKit with incomplete Intl — fall back to a plain fixed format.
        return '₪ ' + n.toFixed(2);
    }
}
function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function openDocDetail(rowId) {
    const overlay = document.getElementById('doc-detail-overlay');
    const body = document.getElementById('doc-modal-body');
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    fetchDocDetail(rowId, body);
}

// Client-side timeout for the on-demand BilBoy detail fetch. Slightly longer
// than the backend's 10s outbound timeout so the server's clean error usually
// wins the race; this is also the WATCHDOG that guarantees the spinner clears
// even when AbortController/fetch/.finally are unavailable or misbehave
// (e.g. older iPadOS Safari, where `new AbortController()` throws).
const DOC_FETCH_TIMEOUT_MS = 12000;
let _docFetchController = null;
let _docFetchToken = null;

function _clearDocFetch() {
    _docFetchToken = null;          // invalidate any pending settle()
    if (_docFetchController) {
        try { _docFetchController.abort(); } catch (e) {}
        _docFetchController = null;
    }
}

function docErrorHtml(rowId, msg) {
    return '<div class="doc-modal-error">' +
        '<div class="dm-err-msg">' + esc(msg) + '</div>' +
        '<button class="dm-retry" onclick="fetchDocDetail(' + Number(rowId) +
        ', document.getElementById(\'doc-modal-body\'))">נסה שוב</button>' +
        '</div>';
}

function fetchDocDetail(rowId, body) {
    // Hardened against WebKit/older-iOS quirks: ANY failure — a synchronous
    // throw (unsupported API), a non-200, a network error, or a fetch that
    // never settles — must clear the spinner and show error + retry. It must
    // NEVER leave an infinite "טוען פירוט מסמך…".
    try {
        _clearDocFetch();
        body.innerHTML = '<div class="doc-modal-loading">טוען פירוט מסמך…</div>';

        // Feature-detect AbortController — older iPadOS Safari throws on `new`.
        var controller = null, signal;
        try {
            if (typeof AbortController !== 'undefined') {
                controller = new AbortController();
                signal = controller.signal;
            }
        } catch (e) { controller = null; signal = undefined; }
        _docFetchController = controller;

        var token = {};
        _docFetchToken = token;
        var done = false;

        var settle = function (html) {
            if (done || _docFetchToken !== token) return;   // superseded/closed
            done = true;
            clearTimeout(watchdog);
            if (controller && _docFetchController === controller) _docFetchController = null;
            body.innerHTML = html;
        };

        // Watchdog — fires regardless of AbortController/fetch behaviour.
        var watchdog = setTimeout(function () {
            if (controller) { try { controller.abort(); } catch (e) {} }
            settle(docErrorHtml(rowId, 'הטעינה ארכה זמן רב מדי, נסה שוב'));
        }, DOC_FETCH_TIMEOUT_MS);

        var opts = signal ? { signal: signal } : {};
        fetch('/api/goods/doc/' + encodeURIComponent(rowId), opts)
            .then(function (r) {
                return r.json().catch(function () { return {}; })
                    .then(function (j) { return { ok: r.ok, j: j }; });
            })
            .then(function (res) {
                if (res.ok) settle(renderDocDetail(res.j));
                else settle(docErrorHtml(rowId, (res.j && res.j.message) ||
                    'לא ניתן לטעון את פירוט המסמך, נסה שוב'));
            })
            .catch(function (err) {
                if (err && err.name === 'AbortError') return;  // watchdog handled it
                settle(docErrorHtml(rowId, 'לא ניתן לטעון את פירוט המסמך, נסה שוב'));
            });
    } catch (e) {
        // Last-resort: a synchronous throw before/around the fetch must still
        // surface an error + retry, never a frozen spinner.
        try { body.innerHTML = docErrorHtml(rowId, 'לא ניתן לטעון את פירוט המסמך, נסה שוב'); }
        catch (e2) {}
    }
}

function renderDocDetail(d) {
    const h = d.header || {};
    const items = d.items || [];
    const typeLabel = DOC_TYPE_LABELS[h.doc_type] || 'מסמך';
    const payPill = h.paid
        ? '<span class="pay-pill paid">שולם</span>'
        : '<span class="pay-pill unpaid">לא שולם</span>';

    let rows = '';
    if (!items.length) {
        rows = '<tr><td colspan="4" style="text-align:center;color:#94a3b8">אין פריטים במסמך</td></tr>';
    } else {
        rows = items.map(it => {
            const disc = it.discount_pct ? ' <span class="line-disc">−' + esc(it.discount_pct) + '%</span>' : '';
            const bc = it.barcode ? '<div class="line-bc">' + esc(it.barcode) + '</div>' : '';
            return '<tr>' +
                '<td><div class="line-name">' + esc(it.name) + disc + '</div>' + bc + '</td>' +
                '<td style="direction:ltr;text-align:left">' + (it.qty == null ? '—' : esc(it.qty)) + '</td>' +
                '<td class="money" style="direction:ltr;text-align:left">' + nis(it.unit_price) + '</td>' +
                '<td class="money" style="direction:ltr;text-align:left;font-weight:600">' + nis(it.line_total) + '</td>' +
                '</tr>';
        }).join('');
    }

    return '' +
        '<div class="dm-head">' +
            '<h3 id="dm-title">' + esc(h.supplier) + '</h3>' +
            '<div class="dm-meta">' +
                '<span class="doc-badge invoice">' + esc(typeLabel) + '</span>' +
                payPill +
                '<span class="dm-ref">אסמכתא ' + esc(h.ref_number) + '</span>' +
                '<span class="dm-date">' + esc((h.date || '').slice(0, 10)) + '</span>' +
            '</div>' +
        '</div>' +
        '<div class="dm-vat">' +
            '<div><span>לפני מע"מ</span><strong>' + nis(h.total_without_vat) + '</strong></div>' +
            '<div><span>מע"מ</span><strong>' + nis(h.total_vat) + '</strong></div>' +
            '<div class="dm-vat-total"><span>סה"כ</span><strong>' + nis(h.total_with_vat) + '</strong></div>' +
        '</div>' +
        '<div class="dm-table-wrap"><table class="data-table dm-table">' +
            '<thead><tr><th>מוצר</th><th>כמות</th><th>מחיר יח׳</th><th>סה"כ שורה</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
        '</table></div>';
}

function closeDocDetail() {
    _clearDocFetch();
    const overlay = document.getElementById('doc-detail-overlay');
    overlay.hidden = true;
    document.body.style.overflow = '';
    // Reset so a stale spinner/error never flashes on the next open.
    const body = document.getElementById('doc-modal-body');
    if (body) body.innerHTML = '<div class="doc-modal-loading">טוען פירוט מסמך…</div>';
}

// ── יעדים: supplier-budget view (lazy-loaded from /api/goal/data) ──
const ils0 = n => '₪ ' + Math.round(n).toLocaleString('en-US');
let _goalsLoaded = false;
// /api/goal/data is current-month pace — annotations only make sense when the
// month picker is on the current month.
const GOODS_IS_CURRENT_MONTH = {{ (selected_month == current_month) | tojson }};

function switchGoodsView(view) {
    const isGoals = view === 'goals';
    document.getElementById('goods-docs-view').hidden = isGoals;
    document.getElementById('goods-goals-view').hidden = !isGoals;
    document.getElementById('goods-view-docs').classList.toggle('active', !isGoals);
    document.getElementById('goods-view-goals').classList.toggle('active', isGoals);
    // Lazy-load on first switch to יעדים — not on initial page load.
    if (isGoals && !_goalsLoaded) { _goalsLoaded = true; loadGoals(); }
}

async function loadGoals() {
    const loading = document.getElementById('goal-loading');
    const wrap = document.getElementById('goal-table-wrap');
    const empty = document.getElementById('goal-empty');
    loading.hidden = false; wrap.hidden = true; empty.hidden = true;
    try {
        const res = await fetch('/api/goal/data');
        if (!res.ok) throw new Error('load failed');
        renderGoals(await res.json());
    } catch (e) {
        _goalsLoaded = false;  // allow retry on next switch
        loading.textContent = 'טעינת היעדים נכשלה, נסה שוב';
    }
}

// יתרה color rule (per-row, foot, strip headline, מסמכים annotation):
//   > 0 → green (.pos), < 0 → red (.neg), == 0 → neutral (no color), null → none.
function remCls(r) {
    if (r === null || r === undefined) return '';
    return r > 0 ? 'pos' : (r < 0 ? 'neg' : '');
}

function renderGoals(data) {
    document.getElementById('goal-day-line').textContent =
        'יום ' + data.days_elapsed + ' מתוך ' + data.days_in_month;
    const loading = document.getElementById('goal-loading');
    const wrap = document.getElementById('goal-table-wrap');
    const empty = document.getElementById('goal-empty');
    const summary = document.getElementById('goal-summary');
    loading.hidden = true;
    if (!data.suppliers.length) { wrap.hidden = true; summary.hidden = true; empty.hidden = false; return; }
    empty.hidden = true; wrap.hidden = false; summary.hidden = false;
    document.getElementById('goal-search-wrap').hidden = false;

    // Summary strip — budgeted-only totals (same numbers as the bottom row).
    document.getElementById('goal-tot-budget').textContent = ils0(data.totals.budget);
    document.getElementById('goal-tot-spent').textContent = ils0(data.totals.spent);
    // קצב הזמנות — store-wide pace over ALL suppliers (informational, separate
    // from the budgeted-only tiles).
    document.getElementById('goal-tot-orderpace').textContent = ils0(data.totals.order_pace);
    const tr = document.getElementById('goal-tot-remaining');
    const tc = remCls(data.totals.remaining);
    tr.textContent = ils0(data.totals.remaining);
    tr.className = 'kpi-value ' + (tc === 'pos' ? 'profit' : (tc === 'neg' ? 'loss' : ''));
    document.getElementById('goal-tot-remaining-card').className =
        'kpi-card goal-kpi-headline ' +
        (tc === 'pos' ? 'kpi-card--profit' : (tc === 'neg' ? 'kpi-card--loss' : ''));
    const overCount = data.suppliers.filter(s => s.remaining !== null && s.remaining < 0).length;
    const op = document.getElementById('goal-overpace');
    op.textContent = overCount + ' ספקים חורגים מהתקציב';
    op.classList.toggle('ok', overCount === 0);

    document.getElementById('goal-tbody').innerHTML = data.suppliers.map(s => {
        const rc = remCls(s.remaining);
        // Row tint mirrors the יתרה color rule: >0 green, <0 red, ==0/none none.
        const rowCls = rc === 'pos' ? 'goal-under' : (rc === 'neg' ? 'goal-over' : '');
        const remCell = s.remaining === null ? '<span class="muted">—</span>' : ils0(s.remaining);
        // Idle: formatted like הוצאה/יתרה (₪ + commas via ils0). Text input so the
        // ₪/commas can show; focus swaps to the raw number (see budget handlers).
        const bv = s.budget === null ? '' : ils0(s.budget);
        return '<tr class="' + rowCls + '" data-supplier="' + esc(s.supplier_name) + '">' +
            '<td>' + esc(s.supplier_name) + '</td>' +
            '<td class="num"><input type="text" inputmode="decimal" ' +
                'class="goal-budget-input" value="' + bv + '" placeholder="הוסף תקציב" aria-label="תקציב חודשי"></td>' +
            '<td class="num goal-spend">' + ils0(s.mtd_spend) + '</td>' +
            '<td class="num goal-pace">' + ils0(s.projected) + '</td>' +
            '<td class="num goal-rem ' + rc + '">' + remCell + '</td>' +
            '</tr>';
    }).join('');
    document.getElementById('goal-foot-budget').textContent = ils0(data.totals.budget);
    document.getElementById('goal-foot-spent').textContent = ils0(data.totals.spent);
    const fr = document.getElementById('goal-foot-remaining');
    fr.textContent = ils0(data.totals.remaining);
    fr.className = 'num ' + remCls(data.totals.remaining);

    applyGoalSearch();   // re-apply any active search term to the fresh rows
}

// Findability filter: substring match (case-insensitive) on the supplier name,
// over the SAME <tr> rows that render as desktop table rows AND mobile cards, so
// one filter covers both. Empty term → show all. Totals/strip are untouched.
function applyGoalSearch() {
    const inp = document.getElementById('goal-search');
    if (!inp) return;
    const q = (inp.value || '').trim().toLowerCase();
    let shown = 0;
    document.querySelectorAll('#goal-tbody tr').forEach(tr => {
        const name = (tr.getAttribute('data-supplier') || '').toLowerCase();
        const match = !q || name.indexOf(q) >= 0;
        tr.style.display = match ? '' : 'none';
        if (match) shown++;
    });
    const hint = document.getElementById('goal-search-empty');
    if (hint) hint.hidden = !(q && shown === 0);
}
document.addEventListener('input', e => {
    if (e.target && e.target.id === 'goal-search') applyGoalSearch();
});

// Strip ₪ / commas / spaces → plain number (or '' when blank). The budget POST
// contract still receives a plain number.
function parseBudget(str) {
    const n = parseFloat(String(str).replace(/[^\d.]/g, ''));
    return isNaN(n) ? '' : n;
}

async function saveBudget(supplier, value, inputEl) {
    inputEl.classList.add('saving');
    try {
        const res = await fetch('/api/goal/budget', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ supplier_name: supplier, monthly_budget: parseBudget(value) }),
        });
        if (!res.ok) throw new Error('save failed');
        renderGoals(await res.json());
        const row = document.querySelector('tr[data-supplier="' + (window.CSS && CSS.escape ? CSS.escape(supplier) : supplier) + '"] .goal-budget-input');
        if (row) { row.classList.add('saved'); setTimeout(() => row.classList.remove('saved'), 1200); }
    } catch (e) {
        inputEl.classList.remove('saving');
        alert('שמירת התקציב נכשלה, נסה שוב');
    }
}

document.addEventListener('change', e => {
    if (!e.target.classList || !e.target.classList.contains('goal-budget-input')) return;
    const tr = e.target.closest('tr');
    if (tr) saveBudget(tr.dataset.supplier, e.target.value, e.target);
});

// Focus → show the plain number for easy typing; blur → reformat ₪ + commas.
document.addEventListener('focusin', e => {
    if (!e.target.classList || !e.target.classList.contains('goal-budget-input')) return;
    e.target.value = parseBudget(e.target.value) || '';
});
document.addEventListener('focusout', e => {
    if (!e.target.classList || !e.target.classList.contains('goal-budget-input')) return;
    const n = parseBudget(e.target.value);
    e.target.value = (n && n > 0) ? ils0(n) : '';
});

document.addEventListener('click', e => {
    const row = e.target.closest('.doc-row');
    if (row) { openDocDetail(row.dataset.rowId); return; }
    if (e.target.id === 'doc-detail-overlay') closeDocDetail();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDocDetail();
    if ((e.key === 'Enter' || e.key === ' ') && document.activeElement &&
        document.activeElement.classList.contains('doc-row')) {
        e.preventDefault();
        openDocDetail(document.activeElement.dataset.rowId);
    }
});

// ── מסמכים → לפי ספק: annotate each supplier group with תקציב · יתרה ──
// Reuses GET /api/goal/data (current-month budget + remaining pace), merged by
// supplier_name. Current month only — pace figures mislead on a closed month.
function annotateSupplierBudgets() {
    if (!GOODS_IS_CURRENT_MONTH) return;
    const groups = document.querySelectorAll('#goods-docs-view .supplier-group');
    if (!groups.length) return;  // not in the "לפי ספק" grouped view
    fetch('/api/goal/data')
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (!data) return;
            const map = {};
            data.suppliers.forEach(s => { if (s.budget !== null) map[s.supplier_name] = s; });
            groups.forEach(g => {
                if (g.querySelector('.sg-budget')) return;  // idempotent
                const nameEl = g.querySelector('.sg-name');
                const s = nameEl && map[nameEl.textContent.trim()];
                if (!s) return;
                const rc = remCls(s.remaining);
                const div = document.createElement('div');
                div.className = 'sg-budget';
                div.innerHTML = 'תקציב ' + ils0(s.budget) +
                    ' · <span class="' + rc + '">יתרה ' + ils0(s.remaining) + '</span>';
                g.querySelector('summary').appendChild(div);
            });
        })
        .catch(() => {});  // annotation is non-critical — never break the doc list
}
annotateSupplierBudgets();

// Deep-link: /goods#goals (used by the multi-branch section headers) lands
// straight on the תקציב view instead of the default מסמכים list.
if (location.hash === '#goals') switchGoodsView('goals');
</script>
