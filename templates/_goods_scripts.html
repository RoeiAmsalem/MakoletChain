<script>
function filterDocs(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const rows = document.querySelectorAll('#goods-table tbody tr');
    rows.forEach(row => {
        if (type === 'all') { row.style.display = ''; }
        else { row.style.display = row.dataset.type === type ? '' : 'none'; }
    });
}

// ── Invoice line-item detail (on-demand BilBoy /customer/doc) ──
const DOC_TYPE_LABELS = { 2: 'תעודת משלוח', 3: 'חשבונית', 4: 'חשבונית זיכוי', 5: 'תעודת החזרה' };

function nis(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    var n = Number(v);
    try {
        return '₪ ' + n.toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    } catch (e) {
        // Older WebKit with incomplete Intl — fall back to a plain fixed format.
        return '₪ ' + n.toFixed(2);
    }
}
function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function openDocDetail(rowId) {
    const overlay = document.getElementById('doc-detail-overlay');
    const body = document.getElementById('doc-modal-body');
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    fetchDocDetail(rowId, body);
}

// Client-side timeout for the on-demand BilBoy detail fetch. Slightly longer
// than the backend's 10s outbound timeout so the server's clean error usually
// wins the race; this is also the WATCHDOG that guarantees the spinner clears
// even when AbortController/fetch/.finally are unavailable or misbehave
// (e.g. older iPadOS Safari, where `new AbortController()` throws).
const DOC_FETCH_TIMEOUT_MS = 12000;
let _docFetchController = null;
let _docFetchToken = null;

function _clearDocFetch() {
    _docFetchToken = null;          // invalidate any pending settle()
    if (_docFetchController) {
        try { _docFetchController.abort(); } catch (e) {}
        _docFetchController = null;
    }
}

function docErrorHtml(rowId, msg) {
    return '<div class="doc-modal-error">' +
        '<div class="dm-err-msg">' + esc(msg) + '</div>' +
        '<button class="dm-retry" onclick="fetchDocDetail(' + Number(rowId) +
        ', document.getElementById(\'doc-modal-body\'))">נסה שוב</button>' +
        '</div>';
}

function fetchDocDetail(rowId, body) {
    // Hardened against WebKit/older-iOS quirks: ANY failure — a synchronous
    // throw (unsupported API), a non-200, a network error, or a fetch that
    // never settles — must clear the spinner and show error + retry. It must
    // NEVER leave an infinite "טוען פירוט מסמך…".
    try {
        _clearDocFetch();
        body.innerHTML = '<div class="doc-modal-loading">טוען פירוט מסמך…</div>';

        // Feature-detect AbortController — older iPadOS Safari throws on `new`.
        var controller = null, signal;
        try {
            if (typeof AbortController !== 'undefined') {
                controller = new AbortController();
                signal = controller.signal;
            }
        } catch (e) { controller = null; signal = undefined; }
        _docFetchController = controller;

        var token = {};
        _docFetchToken = token;
        var done = false;

        var settle = function (html) {
            if (done || _docFetchToken !== token) return;   // superseded/closed
            done = true;
            clearTimeout(watchdog);
            if (controller && _docFetchController === controller) _docFetchController = null;
            body.innerHTML = html;
        };

        // Watchdog — fires regardless of AbortController/fetch behaviour.
        var watchdog = setTimeout(function () {
            if (controller) { try { controller.abort(); } catch (e) {} }
            settle(docErrorHtml(rowId, 'הטעינה ארכה זמן רב מדי, נסה שוב'));
        }, DOC_FETCH_TIMEOUT_MS);

        var opts = signal ? { signal: signal } : {};
        fetch('/api/goods/doc/' + encodeURIComponent(rowId), opts)
            .then(function (r) {
                return r.json().catch(function () { return {}; })
                    .then(function (j) { return { ok: r.ok, j: j }; });
            })
            .then(function (res) {
                if (res.ok) settle(renderDocDetail(res.j));
                else settle(docErrorHtml(rowId, (res.j && res.j.message) ||
                    'לא ניתן לטעון את פירוט המסמך, נסה שוב'));
            })
            .catch(function (err) {
                if (err && err.name === 'AbortError') return;  // watchdog handled it
                settle(docErrorHtml(rowId, 'לא ניתן לטעון את פירוט המסמך, נסה שוב'));
            });
    } catch (e) {
        // Last-resort: a synchronous throw before/around the fetch must still
        // surface an error + retry, never a frozen spinner.
        try { body.innerHTML = docErrorHtml(rowId, 'לא ניתן לטעון את פירוט המסמך, נסה שוב'); }
        catch (e2) {}
    }
}

function renderDocDetail(d) {
    const h = d.header || {};
    const items = d.items || [];
    const typeLabel = DOC_TYPE_LABELS[h.doc_type] || 'מסמך';
    const payPill = h.paid
        ? '<span class="pay-pill paid">שולם</span>'
        : '<span class="pay-pill unpaid">לא שולם</span>';

    let rows = '';
    if (!items.length) {
        rows = '<tr><td colspan="4" style="text-align:center;color:#94a3b8">אין פריטים במסמך</td></tr>';
    } else {
        rows = items.map(it => {
            const disc = it.discount_pct ? ' <span class="line-disc">−' + esc(it.discount_pct) + '%</span>' : '';
            const bc = it.barcode ? '<div class="line-bc">' + esc(it.barcode) + '</div>' : '';
            return '<tr>' +
                '<td><div class="line-name">' + esc(it.name) + disc + '</div>' + bc + '</td>' +
                '<td style="direction:ltr;text-align:left">' + (it.qty == null ? '—' : esc(it.qty)) + '</td>' +
                '<td class="money" style="direction:ltr;text-align:left">' + nis(it.unit_price) + '</td>' +
                '<td class="money" style="direction:ltr;text-align:left;font-weight:600">' + nis(it.line_total) + '</td>' +
                '</tr>';
        }).join('');
    }

    return '' +
        '<div class="dm-head">' +
            '<h3 id="dm-title">' + esc(h.supplier) + '</h3>' +
            '<div class="dm-meta">' +
                '<span class="doc-badge invoice">' + esc(typeLabel) + '</span>' +
                payPill +
                '<span class="dm-ref">אסמכתא ' + esc(h.ref_number) + '</span>' +
                '<span class="dm-date">' + esc((h.date || '').slice(0, 10)) + '</span>' +
            '</div>' +
        '</div>' +
        '<div class="dm-vat">' +
            '<div><span>לפני מע"מ</span><strong>' + nis(h.total_without_vat) + '</strong></div>' +
            '<div><span>מע"מ</span><strong>' + nis(h.total_vat) + '</strong></div>' +
            '<div class="dm-vat-total"><span>סה"כ</span><strong>' + nis(h.total_with_vat) + '</strong></div>' +
        '</div>' +
        '<div class="dm-table-wrap"><table class="data-table dm-table">' +
            '<thead><tr><th>מוצר</th><th>כמות</th><th>מחיר יח׳</th><th>סה"כ שורה</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
        '</table></div>';
}

function closeDocDetail() {
    _clearDocFetch();
    const overlay = document.getElementById('doc-detail-overlay');
    overlay.hidden = true;
    document.body.style.overflow = '';
    // Reset so a stale spinner/error never flashes on the next open.
    const body = document.getElementById('doc-modal-body');
    if (body) body.innerHTML = '<div class="doc-modal-loading">טוען פירוט מסמך…</div>';
}

document.addEventListener('click', e => {
    const row = e.target.closest('.doc-row');
    if (row) { openDocDetail(row.dataset.rowId); return; }
    if (e.target.id === 'doc-detail-overlay') closeDocDetail();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDocDetail();
    if ((e.key === 'Enter' || e.key === ' ') && document.activeElement &&
        document.activeElement.classList.contains('doc-row')) {
        e.preventDefault();
        openDocDetail(document.activeElement.dataset.rowId);
    }
});
</script>
