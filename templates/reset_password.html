<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס סיסמה - MakoletChain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .login-card h1 {
            text-align: center;
            color: white;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .login-card label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            margin-bottom: 1.2rem;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .login-card input[type="password"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            outline: none;
        }
        .login-card button {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .login-card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }
        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .hint {
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
            margin-top: -0.8rem;
            margin-bottom: 1.2rem;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
        }
        .back-link:hover { color: rgba(255,255,255,0.7); }
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }
        .logo-container img {
            height: 60px;
            filter: invert(1) hue-rotate(180deg);
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-orb" style="width:300px; height:300px; background:rgba(99,102,241,0.08); filter:blur(80px); top:10%; left:10%;"></div>
    <div class="bg-orb" style="width:250px; height:250px; background:rgba(139,92,246,0.06); filter:blur(80px); bottom:15%; right:15%;"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='makolet_logo.png') }}" alt="רשת המכולת">
        </div>
        <h1>איפוס סיסמה</h1>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        <a href="/forgot-password" class="back-link">בקש קישור חדש &larr;</a>
        {% else %}
        <form method="POST" action="/reset-password">
            <input type="hidden" name="token" value="{{ token }}">

            <label for="password">סיסמה חדשה</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" dir="ltr">
            <p class="hint">לפחות 8 תווים</p>

            <label for="confirm_password">אימות סיסמה</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" dir="ltr">

            <button type="submit">עדכן סיסמה</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
